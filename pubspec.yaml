name: stackfood_multivendor_driver
description: A new Flutter application.
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  shared_preferences: ^2.5.4
  connectivity_plus: ^7.0.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flutter_local_notifications: ^22.0.0
  firebase_auth: ^6.1.2
  path_provider: ^2.1.5
  pin_code_fields: ^9.4.0
  http: ^1.6.0
  flutter_switch: ^0.3.2
  shimmer_animation: ^2.2.2+1
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  google_maps_flutter: ^2.14.0
  url_launcher: ^6.3.2
  vibration: ^3.1.5
  image_picker: ^1.2.1
  phone_numbers_parser: ^9.0.19
  country_code_picker: ^3.4.1
  audioplayers: ^6.5.1
  flutter_widget_from_html_core: ^0.17.0
  intl: ^0.20.2
  path: ^1.9.1
  http_parser: ^4.1.2
  dotted_border: ^3.1.0
  photo_view: ^0.15.0
  flutter_inappwebview: ^6.1.5
  file_picker: ^11.0.2
  flutter_svg: ^2.2.3
  video_player: ^2.10.1
  chewie: ^1.13.1
  permission_handler: ^12.0.1
  flutter_foreground_task: ^9.2.0
  just_the_tooltip: ^0.0.12
  cached_network_image: ^3.4.1
  emoji_picker_flutter: ^4.4.0
  dropdown_button2: ^3.1.0
  local_auth: ^3.0.1
  app_settings: ^7.0.0
  device_info_plus: ^12.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/image/
    - assets/language/
    - assets/notification.mp3
    - assets/json/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/font/Roboto-Regular.ttf
          weight: 400
        - asset: assets/font/Roboto-Medium.ttf
          weight: 500
        - asset: assets/font/Roboto-Bold.ttf
          weight: 700
        - asset: assets/font/Roboto-Black.ttf
          weight: 900